minimum_pre_commit_version: "3.2.0"
default_install_hook_types: [pre-commit]
default_stages: [pre-commit]

repos:
  - repo: local
    hooks:
      - id: repo-checks
        name: repo-checks
        entry: python3 -m tools.repo_checks.all_checks
        language: system
        pass_filenames: false
        stages: [pre-commit, manual]
      - id: ruff-check
        name: ruff-check
        entry: python3 -m ruff check .
        language: system
        pass_filenames: false
        stages: [pre-commit, manual]
      - id: ruff-format-check
        name: ruff-format-check
        entry: python3 -m ruff format --check .
        language: system
        pass_filenames: false
        stages: [pre-commit, manual]
      - id: mypy
        name: mypy
        entry: python3 -m mypy src tests tools
        language: system
        pass_filenames: false
        stages: [pre-push, manual]
      - id: pytest
        name: pytest
        entry: python3 -m pytest --cov=open_postal_codes --cov-fail-under=90
        language: system
        pass_filenames: false
        stages: [pre-push, manual]

name: Refresh D-A-CH Post Code Data

on:
  schedule:
    - cron: "17 2 * * 1"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish validated changes through the automated data pull request"
        required: false
        default: false
        type: boolean
      regions:
        description: "Optional comma-separated Geofabrik region names for a scoped refresh"
        required: false
        type: string
      countries:
        description: "Optional comma-separated country slugs or ISO codes"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: data-refresh-post-code
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      PUBLISH_ENABLED: >-
        ${{ github.ref == 'refs/heads/main' &&
            (github.event_name == 'schedule' ||
            (github.event_name == 'workflow_dispatch' && inputs.publish)) }}

    steps:
      - name: Validate automation configuration
        if: env.PUBLISH_ENABLED == 'true'
        env:
          DATA_REFRESH_APP_CLIENT_ID: ${{ vars.DATA_REFRESH_APP_CLIENT_ID }}
          DATA_REFRESH_APP_PRIVATE_KEY: ${{ secrets.DATA_REFRESH_APP_PRIVATE_KEY }}
        run: |
          if [ -z "${DATA_REFRESH_APP_CLIENT_ID}" ] || [ -z "${DATA_REFRESH_APP_PRIVATE_KEY}" ]; then
            {
              echo "DATA_REFRESH_APP_CLIENT_ID and DATA_REFRESH_APP_PRIVATE_KEY must be configured."
              echo "Use a GitHub App installation token so refresh-created pull requests trigger normal pull request gates."
            } >&2
            exit 1
          fi

      - name: Generate checkout token
        if: env.PUBLISH_ENABLED == 'true'
        id: checkout-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.DATA_REFRESH_APP_CLIENT_ID }}
          private-key: ${{ secrets.DATA_REFRESH_APP_PRIVATE_KEY }}
          permission-contents: read

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.checkout-token.outputs.token || github.token }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          cache: pip
          python-version: "3.12"

      - name: Install dependencies
        run: python3 -m pip install -e '.[dev]'

      - name: Run code preflight checks
        run: |
          python3 -m pytest -m unit --cov=open_postal_codes --cov-fail-under=90
          python3 -m ruff check .
          python3 -m ruff format --check .
          python3 -m mypy src tests tools

      - name: Refresh regional Geofabrik data
        env:
          REQUESTED_COUNTRIES: ${{ inputs.countries }}
          REQUESTED_REGIONS: ${{ inputs.regions }}
        run: |
          python3 -u -m open_postal_codes.refresh_data \
            --download-root "${RUNNER_TEMP}/geofabrik-pbf" \
            --countries "${REQUESTED_COUNTRIES}" \
            --regions "${REQUESTED_REGIONS}" \
            --report-path "${RUNNER_TEMP}/refresh-report.json"

      - name: Validate generated data and package Pages
        run: |
          python3 -m tools.repo_checks.all_checks
          python3 -m open_postal_codes.pages --output-root out
          git diff --check

      - name: Detect data changes
        id: changes
        run: |
          git diff --name-only -- \
            data/public/v1 \
            data/regional/v1 \
            data/sources/geofabrik-regions.json \
            > "${RUNNER_TEMP}/changed-data-files.txt"
          if [ -s "${RUNNER_TEMP}/changed-data-files.txt" ]; then
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Collect refresh metadata
        id: metadata
        run: |
          python3 - <<'PY' >> "${GITHUB_OUTPUT}"
          import json
          from pathlib import Path

          metadata = json.loads(
              Path("data/sources/geofabrik-regions.json").read_text(encoding="utf-8")
          )

          print(f"data_refreshed_at={metadata.get('generated_at', 'unknown')}")
          for country in ("de", "at", "ch"):
              path = Path(f"data/public/v1/{country}/post_code.csv")
              records = max(sum(1 for _ in path.open(encoding="utf-8")) - 1, 0)
              print(f"records_{country}={records}")
          PY

      - name: Prepare data pull request body
        if: env.PUBLISH_ENABLED == 'true' && steps.changes.outputs.changed == 'true'
        env:
          REQUESTED_COUNTRIES_INPUT: ${{ inputs.countries }}
          REQUESTED_REGIONS_INPUT: ${{ inputs.regions }}
          DATA_REFRESHED_AT: ${{ steps.metadata.outputs.data_refreshed_at }}
          RECORDS_DE: ${{ steps.metadata.outputs.records_de }}
          RECORDS_AT: ${{ steps.metadata.outputs.records_at }}
          RECORDS_CH: ${{ steps.metadata.outputs.records_ch }}
          REFRESH_REPORT_PATH: ${{ runner.temp }}/refresh-report.json
        run: |
          requested_countries="${REQUESTED_COUNTRIES_INPUT:-de,at,ch}"
          requested_regions="${REQUESTED_REGIONS_INPUT:-all selected sources}"
          changed_files="$(git diff --name-only data/public/v1 data/regional/v1 data/sources/geofabrik-regions.json)"
          {
            echo "Refreshes D-A-CH post code outputs from Geofabrik PBF files."
            echo ""
            echo "## Summary"
            echo "- Countries: ${requested_countries}"
            echo "- Regions: ${requested_regions}"
            echo "- Data refreshed at: ${DATA_REFRESHED_AT}"
            echo "- DE records: ${RECORDS_DE}"
            echo "- AT records: ${RECORDS_AT}"
            echo "- CH records: ${RECORDS_CH}"
            echo "- Quality gates passed in the refresh workflow."
            echo ""
            echo "## Source status"
            echo ""
            python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          def markdown(value: object) -> str:
              return str(value).replace("`", "'").replace("\n", " ")

          report = json.loads(
              Path(os.environ["REFRESH_REPORT_PATH"]).read_text(encoding="utf-8")
          )
          sources = report.get("sources", [])
          for source in sources if isinstance(sources, list) else []:
              if not isinstance(source, dict):
                  continue
              name = markdown(source.get("region", "unknown"))
              status = markdown(source.get("status", "unknown"))
              fallback = " — **last-known-good fallback**" if status == "reused_last_good" else ""
              error_class = source.get("error_class")
              reason = f"; error class: `{markdown(error_class)}`" if error_class else ""
              print(f"- `{name}`: `{status}`{fallback}{reason}")
          PY
            echo ""
            echo "## Changed files"
            if [ -n "${changed_files}" ]; then
              printf "%s\n" "${changed_files}" | sed "s/^/- \`/" | sed "s/$/\`/"
            else
              echo "- None"
            fi
          } > "${RUNNER_TEMP}/data-refresh-body.md"

      - name: Generate publication token
        if: env.PUBLISH_ENABLED == 'true' && steps.changes.outputs.changed == 'true'
        id: publication-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.DATA_REFRESH_APP_CLIENT_ID }}
          private-key: ${{ secrets.DATA_REFRESH_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
          permission-checks: read

      - name: Resolve GitHub App bot identity
        if: env.PUBLISH_ENABLED == 'true' && steps.changes.outputs.changed == 'true'
        id: app-user
        env:
          GH_TOKEN: ${{ steps.publication-token.outputs.token }}
        run: |
          echo "user_id=$(gh api "/users/${{ steps.publication-token.outputs.app-slug }}[bot]" --jq .id)" >> "${GITHUB_OUTPUT}"

      - name: Commit data changes
        if: env.PUBLISH_ENABLED == 'true' && steps.changes.outputs.changed == 'true'
        id: commit
        env:
          GH_TOKEN: ${{ steps.publication-token.outputs.token }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git ls-remote --exit-code --heads origin dev/data-refresh-post-code >/dev/null 2>&1; then
            git fetch origin dev/data-refresh-post-code:refs/remotes/origin/dev/data-refresh-post-code
          fi
          git config user.name "${{ steps.publication-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.app-user.outputs.user_id }}+${{ steps.publication-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git switch -c dev/data-refresh-post-code
          git add data/public/v1 data/regional/v1 data/sources/geofabrik-regions.json
          git commit -m "chore(data): refresh post code outputs"
          echo "head_sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"
          git push --force-with-lease origin HEAD:dev/data-refresh-post-code

      - name: Open or update data pull request
        if: env.PUBLISH_ENABLED == 'true' && steps.changes.outputs.changed == 'true'
        id: data-pr
        env:
          GH_TOKEN: ${{ steps.publication-token.outputs.token }}
        run: |
          existing_pr="$(gh pr list --head dev/data-refresh-post-code --state open --json number --jq '.[0].number // ""')"
          if [ -n "${existing_pr}" ]; then
            gh pr edit "${existing_pr}" \
              --title "chore(data): refresh post code outputs" \
              --body-file "${RUNNER_TEMP}/data-refresh-body.md"
            pr_number="${existing_pr}"
          else
            gh pr create \
              --base main \
              --head dev/data-refresh-post-code \
              --title "chore(data): refresh post code outputs" \
              --body-file "${RUNNER_TEMP}/data-refresh-body.md"
            pr_number="$(gh pr list --head dev/data-refresh-post-code --state open --json number --jq '.[0].number')"
          fi
          pr_url="$(gh pr view "${pr_number}" --json url --jq .url)"
          {
            echo "number=${pr_number}"
            echo "url=${pr_url}"
          } >> "${GITHUB_OUTPUT}"

      - name: Wait for required pull request checks
        if: env.PUBLISH_ENABLED == 'true' && steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.publication-token.outputs.token }}
        run: |
          sleep 20
          set +e
          timeout --signal=TERM --kill-after=30s 20m \
            gh pr checks "${{ steps.data-pr.outputs.number }}" \
              --required --watch --fail-fast
          checks_status=$?
          set -e
          if [ "${checks_status}" -ne 0 ]; then
            echo "Required checks failed or did not complete within 20 minutes." >&2
            gh pr view "${{ steps.data-pr.outputs.number }}" \
              --json url,state,headRefOid,mergeStateStatus >&2 || true
            gh pr checks "${{ steps.data-pr.outputs.number }}" --required >&2 || true
            exit "${checks_status}"
          fi

          checked_head="$(gh pr view "${{ steps.data-pr.outputs.number }}" --json headRefOid --jq .headRefOid)"
          pr_state="$(gh pr view "${{ steps.data-pr.outputs.number }}" --json state --jq .state)"
          if [ "${checked_head}" != "${{ steps.commit.outputs.head_sha }}" ] || [ "${pr_state}" != "OPEN" ]; then
            echo "Pull request postcondition failed before merge." >&2
            gh pr view "${{ steps.data-pr.outputs.number }}" \
              --json url,state,headRefOid,mergeStateStatus >&2
            exit 1
          fi

      - name: Merge data pull request
        if: env.PUBLISH_ENABLED == 'true' && steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.publication-token.outputs.token }}
        run: |
          gh pr merge "${{ steps.data-pr.outputs.number }}" \
            --squash \
            --delete-branch \
            --match-head-commit "${{ steps.commit.outputs.head_sha }}" \
            --subject "chore(data): refresh post code outputs" \
            --body "Automated D-A-CH post code data refresh."
          merged_state="$(gh pr view "${{ steps.data-pr.outputs.number }}" --json state --jq .state)"
          merged_head="$(gh pr view "${{ steps.data-pr.outputs.number }}" --json headRefOid --jq .headRefOid)"
          merged_at="$(gh pr view "${{ steps.data-pr.outputs.number }}" --json mergedAt --jq .mergedAt)"
          if [ "${merged_state}" != "MERGED" ] \
            || [ "${merged_head}" != "${{ steps.commit.outputs.head_sha }}" ] \
            || [ -z "${merged_at}" ]; then
            echo "Pull request merge postcondition failed." >&2
            gh pr view "${{ steps.data-pr.outputs.number }}" \
              --json url,state,mergedAt,headRefOid,mergeCommit >&2
            exit 1
          fi

          for attempt in 1 2 3; do
            if ! git ls-remote --exit-code --heads origin dev/data-refresh-post-code >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "Merged refresh branch still exists after deletion checks." >&2
          exit 1

      - name: Ensure diagnostic report exists
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          REFRESH_REPORT_PATH: ${{ runner.temp }}/refresh-report.json
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path(os.environ["REFRESH_REPORT_PATH"])
          report_error = ""
          if report_path.is_file():
              try:
                  report = json.loads(report_path.read_text(encoding="utf-8"))
                  if not isinstance(report, dict):
                      report_error = "report_root_is_not_an_object"
              except (OSError, json.JSONDecodeError):
                  report_error = "invalid_report_json"
          else:
              report_error = "workflow_failed_before_report"

          if not report_error:
              raise SystemExit(0)

          report_path.parent.mkdir(parents=True, exist_ok=True)
          report_path.write_text(
              json.dumps(
                  {
                      "status": "failed",
                      "error_class": report_error,
                      "sources": [],
                      "warnings": [
                          "The refresh command did not produce a valid diagnostic report."
                      ],
                  },
                  indent=2,
                  sort_keys=True,
              )
              + "\n",
              encoding="utf-8",
          )
          if os.environ["JOB_STATUS"] == "success":
              raise SystemExit("successful refresh is missing a valid diagnostic report")
          PY

      - name: Upload refresh diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: data-refresh-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/refresh-report.json
          if-no-files-found: error
          retention-days: 14

      - name: Write final refresh summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          TRACKED_DATA_CHANGED: ${{ steps.changes.outputs.changed }}
          DATA_REFRESHED_AT: ${{ steps.metadata.outputs.data_refreshed_at }}
          RECORDS_DE: ${{ steps.metadata.outputs.records_de }}
          RECORDS_AT: ${{ steps.metadata.outputs.records_at }}
          RECORDS_CH: ${{ steps.metadata.outputs.records_ch }}
          DATA_PULL_REQUEST_URL: ${{ steps.data-pr.outputs.url }}
          REQUESTED_COUNTRIES: ${{ inputs.countries }}
          REQUESTED_REGIONS: ${{ inputs.regions }}
          REFRESH_REPORT_PATH: ${{ runner.temp }}/refresh-report.json
          CHANGED_FILES_PATH: ${{ runner.temp }}/changed-data-files.txt
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path
          from typing import Any

          def markdown(value: Any) -> str:
              return str(value if value not in (None, "") else "unknown").replace(
                  "|", "\\|"
              ).replace("\n", " ")

          report = json.loads(
              Path(os.environ["REFRESH_REPORT_PATH"]).read_text(encoding="utf-8")
          )
          sources = report.get("sources", [])
          if isinstance(sources, dict):
              sources = [
                  {"source": source_name, **details}
                  for source_name, details in sources.items()
                  if isinstance(details, dict)
              ]
          if not isinstance(sources, list):
              sources = []

          requested_countries = os.environ["REQUESTED_COUNTRIES"] or "de,at,ch"
          requested_regions = (
              os.environ["REQUESTED_REGIONS"] or "all selected sources"
          )
          lines = [
              "## Data refresh summary",
              "",
              f"- Workflow result: {markdown(os.environ['JOB_STATUS'])}",
              f"- Refresh result: {markdown(report.get('status'))}",
              f"- Countries: {markdown(requested_countries)}",
              f"- Regions: {markdown(requested_regions)}",
              f"- Publication enabled: {markdown(os.environ['PUBLISH_ENABLED'])}",
              f"- Tracked data changed: {markdown(os.environ['TRACKED_DATA_CHANGED'])}",
              f"- Data refreshed at: {markdown(os.environ['DATA_REFRESHED_AT'])}",
              f"- Records (DE / AT / CH): {markdown(os.environ['RECORDS_DE'])} / "
              f"{markdown(os.environ['RECORDS_AT'])} / {markdown(os.environ['RECORDS_CH'])}",
          ]
          if report.get("error_class"):
              lines.append(f"- Error class: {markdown(report['error_class'])}")
          if os.environ["DATA_PULL_REQUEST_URL"]:
              lines.append(
                  f"- Pull request: {markdown(os.environ['DATA_PULL_REQUEST_URL'])}"
              )

          if sources:
              lines.extend(
                  [
                      "",
                      "### Source results",
                      "",
                      "| Source | Status | Records | Unique post codes | Inferred | Error |",
                      "| --- | --- | ---: | ---: | ---: | --- |",
                  ]
              )
              for source in sources:
                  if not isinstance(source, dict):
                      continue
                  lines.append(
                      "| "
                      + " | ".join(
                          markdown(value)
                          for value in (
                              source.get(
                                  "source", source.get("region", source.get("name"))
                              ),
                              source.get("status"),
                              source.get("records"),
                              source.get("unique_post_codes"),
                              source.get(
                                  "inferred_records",
                                  source.get("inferred_state_records"),
                              ),
                              source.get("error_class"),
                          )
                      )
                      + " |"
                  )

          warnings = report.get("warnings", [])
          if isinstance(warnings, list) and warnings:
              lines.extend(["", "### Warnings", ""])
              lines.extend(f"- {markdown(warning)}" for warning in warnings)

          changed_files_path = Path(os.environ["CHANGED_FILES_PATH"])
          if changed_files_path.is_file():
              changed_files = changed_files_path.read_text(
                  encoding="utf-8"
              ).splitlines()
          else:
              changed_files_result = subprocess.run(
                  [
                      "git",
                      "diff",
                      "--name-only",
                      "--",
                      "data/public/v1",
                      "data/regional/v1",
                      "data/sources/geofabrik-regions.json",
                  ],
                  check=False,
                  capture_output=True,
                  text=True,
              )
              changed_files = (
                  changed_files_result.stdout.splitlines()
                  if changed_files_result.returncode == 0
                  else []
              )
          lines.extend(["", "### Changed files", ""])
          lines.extend(f"- `{markdown(path)}`" for path in changed_files)
          if not changed_files:
              lines.append("- None")

          if os.environ["JOB_STATUS"] != "success":
              lines.extend(
                  [
                      "",
                      "The workflow stopped before publication or left the data pull request "
                      "open. Review the first failed step and the diagnostic artifact.",
                  ]
              )

          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open(
              "a", encoding="utf-8"
          ) as summary:
              summary.write("\n".join(lines) + "\n")
          PY

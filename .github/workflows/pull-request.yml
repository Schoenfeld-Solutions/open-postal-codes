name: Pull Request Gates

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pull-request-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-pr-title:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate Conventional Commit pull request title
        env:
          OPEN_POSTAL_CODES_COMMIT_SUBJECT: ${{ github.event.pull_request.title }}
        run: python3 -m tools.repo_checks.commit_subject_check

  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        continue-on-error: true

  quality:
    runs-on: ubuntu-latest
    needs: [validate-pr-title, dependency-review]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          cache: pip
          python-version: "3.12"

      - name: Install dependencies
        run: python3 -m pip install -e '.[dev]'

      - name: Run tests with coverage
        run: python3 -m pytest --cov=open_postal_codes --cov-fail-under=90

      - name: Run Ruff
        run: python3 -m ruff check .

      - name: Check formatting
        run: python3 -m ruff format --check .

      - name: Run Mypy
        run: python3 -m mypy src tests tools

      - name: Run repository checks
        run: python3 -m tools.repo_checks.all_checks

      - name: Package Pages site
        run: python3 -m open_postal_codes.pages --output-root out

      - name: Check whitespace
        run: git diff --check

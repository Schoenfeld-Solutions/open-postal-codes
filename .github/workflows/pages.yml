name: Build and Publish GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          cache: pip
          python-version: "3.12"

      - name: Install dependencies
        run: python3 -m pip install -e '.[dev]'

      - name: Run quality gates
        run: |
          python3 -m pytest --cov=open_postal_codes --cov-fail-under=90
          python3 -m ruff check .
          python3 -m ruff format --check .
          python3 -m mypy src tests tools
          python3 -m tools.repo_checks.all_checks
          git diff --check

  package-site:
    runs-on: ubuntu-latest
    needs: [quality]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          cache: pip
          python-version: "3.12"

      - name: Install package
        run: python3 -m pip install -e .

      - name: Package GitHub Pages site
        run: python3 -m open_postal_codes.pages --output-root out

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: out

  deploy:
    runs-on: ubuntu-latest
    needs: [package-site]
    timeout-minutes: 10

    permissions:
      contents: read
      id-token: write
      pages: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
